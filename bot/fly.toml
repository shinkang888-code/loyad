# filepath: bot/fly.toml
# Fly.io 배포 (Railway 대안). bot/ 디렉터리에서: fly launch / fly deploy
app = "lawygo-bot"
primary_region = "nrt"

[build]
  dockerfile = "Dockerfile"

[env]
  HEADLESS = "true"
  OCR_PROVIDER = "ddddocr"
  DDDDOCR_URL = "http://127.0.0.1:8000"
  DDDDOCR_CHARSETS = "0123456789"
  BOT_CONCURRENCY = "1"
  CAPTCHA_MAX_RETRY = "6"

[http_service]
  internal_port = 8787
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "60s"
    interval = "30s"
    method = "GET"
    path = "/health"
    timeout = "10s"

[[vm]]
  memory = "2048mb"
  cpu_kind = "shared"
  cpus = 1
